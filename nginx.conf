server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # ── Cross-origin isolation ──────────────────────────────────────────────
  # Unlocks SharedArrayBuffer → multi-threaded onnxruntime-web (SOD runs ~10-15s
  # instead of ~60s single-thread). MUST be present on every response.
  # COEP `credentialless` still lets the jsDelivr ORT runtime + HF model CDNs load.
  # NOTE: nginx does NOT inherit add_header into a location that sets its own
  # add_header — so these two lines are repeated in each location below.
  add_header Cross-Origin-Opener-Policy   same-origin   always;
  add_header Cross-Origin-Embedder-Policy credentialless always;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cross-Origin-Opener-Policy   same-origin   always;
    add_header Cross-Origin-Embedder-Policy credentialless always;
  }

  # index.html must not be cached, or clients pin to a stale build.
  location = /index.html {
    add_header Cache-Control "no-cache";
    add_header Cross-Origin-Opener-Policy   same-origin   always;
    add_header Cross-Origin-Embedder-Policy credentialless always;
  }

  # Content-hashed build assets — cache hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Cross-Origin-Opener-Policy   same-origin   always;
    add_header Cross-Origin-Embedder-Policy credentialless always;
  }

  # SOD model (~46 MB) — cache, served as a plain binary for fetch().
  location /models/ {
    expires 30d;
    add_header Cache-Control "public";
    add_header Cross-Origin-Opener-Policy   same-origin   always;
    add_header Cross-Origin-Embedder-Policy credentialless always;
  }

  # Reasonable upload/transfer ceiling for large model/image fetches.
  client_max_body_size 64m;
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
